theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Kolkata

title: 0xMikasa
tagline: Breaking things, legally.
description: Security writeups, HTB machines, and notes from the field.

url: "https://mikasa-ack0x.github.io"

github:
  username: mikasa-ack0x

twitter:
  username:
  
linkedin:
  username: ritux-ace
  
social:
  name: 0xMikasa
  email:
  links:
    - https://github.com/mikasa-ack0x
    - https://www.linkedin.com/in/ritux-ace/

theme_mode: dark

avatar: "/assets/img/avatar.jpeg"

toc: true

comments:
  active:

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
